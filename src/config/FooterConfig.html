<script>
(function() {
  const el = document.getElementById('custom-right-widgets');
  if (!el) return;
  const sidebar = document.getElementById('right-sidebar-sticky');
  if (!sidebar) return;
  const children = el.children;
  let delay = 200;
  for (let i = 0; i < children.length; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'onload-animation';
    wrapper.style.animationDelay = delay + 'ms';
    wrapper.appendChild(children[i].cloneNode(true));
    sidebar.appendChild(wrapper);
    delay += 50;
  }
  el.remove();
})();
</script>
